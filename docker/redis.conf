# Bound to loopback only: this Redis instance is private to the Plaza container,
# never reached from outside it, so no auth/TLS is needed on top.
bind 127.0.0.1 -::1
protected-mode yes
port 6379

dir /data
daemonize no
supervised no
pidfile ""
loglevel notice

save 900 1
save 300 10
save 60 10000
appendonly no
